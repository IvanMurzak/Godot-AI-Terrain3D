# PR gate for a Godot-MCP extension. Activated by `init` (test-pull-request.yml-sample -> .yml).
# Fans the reusable test.yml across a multi-Godot-version matrix. Edit the matrix to the versions you
# support; keep `sdk` == `godot` (the Godot.NET.Sdk/GodotSharp version ships with that editor).
name: test-pull-request

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # CLASS-B floor: Terrain3D v1.0.2-stable's terrain.gdextension declares compatibility_minimum = 4.4
        # ("Godot 4.4-4.6+. Use 1.0.0 for 4.3."), so the addon's GDExtension .so cannot load on a 4.3.0
        # editor — the 4.3.0 e2e leg would red on the first push. Floor pinned at 4.4.1 (drop the 4.3.0 leg).
        include:
          - godot: "4.4.1"
            sdk: "4.4.1"
          - godot: "4.5.1"
            sdk: "4.5.1"
    uses: ./.github/workflows/test.yml
    with:
      godot-version: ${{ matrix.godot }}
      godot-sdk-version: ${{ matrix.sdk }}
    secrets: inherit
